<div class="page">

  <!-- HEADER -->
  <div class="menu-header">
    <div>
      <button class="btn-outline" (click)="goBack()">Back</button>
      <button class="btn-gold" (click)="toggleCart()">
        🛒 {{ cart.length }} | ₹{{ getCartTotal() }}
      </button>
    </div>
  </div>

  <!-- TITLE -->
  <div class="menu-title">
    <h1>{{ restaurantName || 'Menu' }}</h1>
    <p>Premium Food Experience</p>
  </div>

  <!-- MENU -->
  <div class="grid" *ngIf="menuItems?.length; else empty">
    <div *ngFor="let item of menuItems" class="card">
      <!-- ✅ IMAGE SECTION -->
      <div class="item-image-container">
        <img *ngIf="item.imageUrl" 
             [src]="'http://localhost:8080/images/' + item.imageUrl" 
             class="item-image"
             (error)="item.imageUrl = null"
             onerror="this.src='https://via.placeholder.com/300x200?text=Food'">
        <div *ngIf="!item.imageUrl" class="no-image-placeholder">
          🍽️
        </div>
      </div>
      
      <!-- CONTENT SECTION -->
      <div class="card-content">
        <h3>{{ item.name }}</h3>
        <p>{{ item.description || 'Delicious food item' }}</p>
        <div class="card-bottom">
          <span class="price">₹{{ item.price }}</span>
          <button class="btn-gold" (click)="addToCart(item)">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <!-- EMPTY -->
  <ng-template #empty>
    <p class="empty">Menu items will be shown here</p>
  </ng-template>

  <!-- CART -->
  <div class="cart" [class.open]="showCart">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="close-cart" (click)="toggleCart()">×</button>
    </div>

    <div *ngFor="let item of cart" class="cart-item">
      <div class="cart-item-info">
        <p>{{ item.name }}</p>
        <small>₹{{ item.price }} x {{ item.quantity }}</small>
      </div>
      <div class="cart-item-actions">
        <button (click)="removeFromCart(item)">-</button>
        <span>{{ item.quantity }}</span>
        <button (click)="addToCart(item)">+</button>
      </div>
    </div>

    <div class="cart-footer">
      <h4>Total: ₹{{ getCartTotal() }}</h4>
      <button class="btn-gold" (click)="placeOrder()">Place Order</button>
    </div>
  </div>

</div>
