<div class="create-restaurant-container">
  <div class="form-card">
    
    <div class="form-header">
      <button class="back-btn" (click)="goBack()">← Back</button>
      <h2>Register Your Restaurant</h2>
      <p>Join our platform and reach more customers</p>
    </div>
    
    <div *ngIf="successMessage" class="alert-success">
      ✅ {{ successMessage }}
    </div>
    
    <div *ngIf="errorMessage" class="alert-error">
      ❌ {{ errorMessage }}
    </div>
    
    <form (ngSubmit)="onSubmit()" #restaurantForm="ngForm">
      
      <div class="form-group">
        <label>Restaurant Name *</label>
        <input type="text" [(ngModel)]="restaurantData.name" name="name" required placeholder="Enter restaurant name" class="form-control">
      </div>
      
      <div class="form-group">
        <label>Cuisine Type</label>
        <input type="text" [(ngModel)]="restaurantData.cuisine" name="cuisine" placeholder="e.g., Italian, Chinese, Indian" class="form-control">
      </div>
      
      <div class="form-group">
        <label>Address *</label>
        <input type="text" [(ngModel)]="restaurantData.address" name="address" required placeholder="Full address" class="form-control">
      </div>
      
      <div class="form-group">
        <label>Location/City</label>
        <input type="text" [(ngModel)]="restaurantData.location" name="location" placeholder="e.g., Delhi, Mumbai, Bangalore" class="form-control">
      </div>
      
      <div class="form-group">
        <label>Rating (0-5)</label>
        <input type="number" [(ngModel)]="restaurantData.rating" name="rating" step="0.1" min="0" max="5" placeholder="4.5" class="form-control">
      </div>
      
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" [(ngModel)]="restaurantData.imageUrl" name="imageUrl" placeholder="https://example.com/image.jpg" class="form-control">
      </div>
      
      <div class="form-group">
        <label>Owner Email *</label>
        <input type="email" [(ngModel)]="restaurantData.ownerEmail" name="ownerEmail" required readonly class="form-control readonly-field">
        <small class="help-text">Auto-filled from your login</small>
      </div>
      
      <button type="submit" class="submit-btn" [disabled]="loading || !restaurantForm.valid">
        <span *ngIf="loading">Creating...</span>
        <span *ngIf="!loading">Create Restaurant</span>
      </button>
      
    </form>
    
  </div>
</div>
