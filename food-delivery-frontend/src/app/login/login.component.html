<div class="login-container">

  <div class="login-overlay"></div>

  <div class="login-card">

    <h1 class="app-title">🍽 Food<span>Royal</span></h1>
    <p class="tagline">Premium Food Delivery Experience</p>

    <h2 class="login-heading">Welcome Back</h2>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

      <div class="form-group">
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          class="form-control"
          placeholder="📧 Email">
      </div>

      <div class="form-group">
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          class="form-control"
          placeholder="🔒 Password">
      </div>

      <div *ngIf="errorMessage" class="alert-error">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login →' }}
      </button>

    </form>

    <div class="divider">
      <span>OR</span>
    </div>

    <div class="register-link">
      <p>New here?</p>
      <a routerLink="/register">Create an account</a>
    </div>

    <!-- ✅ FIXED EMAIL DISPLAY -->
    <div class="demo-box">
      <h4>Demo Accounts</h4>
      <p><strong>👤 Customer:</strong> customer1&#64;mail.com / 12345</p>
      <p><strong>🍽 Restaurant:</strong> restaurant1&#64;mail.com / 12345</p>
      <p><strong>🚚 Delivery:</strong> delivery1&#64;mail.com / 12345</p>
    </div>

  </div>

</div>
